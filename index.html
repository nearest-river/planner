<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunflower Tomorrow's Plan</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fff7d6 0%, #ffecb3 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary: #fbbf24;
            --accent-orange: #fb923c;
            --accent-mint: #6ee7b7;
            --accent-blue: #93c5fd;
            --accent-pink: #fca5a5;
            --text-dark: #4b5563;
            --shadow: 0 10px 30px -5px rgba(251, 191, 36, 0.3);
            --radius: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            transition: opacity 0.5s ease;
        }

        /* Floating bubbles */
        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            z-index: -1;
            animation: float 6s infinite ease-in-out;
        }
        .bubble:nth-child(1) { width: 60px; height: 60px; background: var(--accent-mint); top: 10%; left: 10%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 80px; height: 80px; background: var(--accent-pink); top: 20%; right: 15%; animation-delay: 1s; }
        .bubble:nth-child(3) { width: 50px; height: 50px; background: var(--accent-blue); bottom: 15%; left: 20%; animation-delay: 2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Intro Modal */
        #introModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        
        .modal-card {
            background: white;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            border: 2px solid #fef3c7;
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 1.5rem;
            color: #ea580c;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .modal-text {
            color: #6b7280;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .modal-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-yes {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-yes:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4); }

        .btn-no {
            background: #e5e7eb;
            color: #6b7280;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-no:hover { background: #d1d5db; }

        /* Main Planner (Hidden initially) */
        #plannerContainer {
            display: none; 
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 35px;
            position: relative;
            backdrop-filter: blur(10px);
            border: 2px solid white;
        }

        .sunflower-top {
            position: absolute;
            top: -25px;
            right: -15px;
            width: 90px;
            height: 90px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            animation: sway 3s infinite ease-in-out alternate;
        }

        @keyframes sway { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

        h1 {
            text-align: center;
            color: #ea580c;
            font-size: 1.9rem;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 1rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .highlight-tomorrow {
            background: linear-gradient(to right, #fef3c7, #fde68a);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            color: #92400e;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 20px;
            border: 1px solid #fcd34d;
            width: 100%;
            text-align: center;
        }

        /* Dropdown Styling */
        .dropdown-container {
            margin-bottom: 15px;
        }
        .dropdown-label {
            display: block;
            color: #d97706;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            padding-left: 5px;
        }
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            background-color: #fafafa;
            cursor: pointer;
            appearance: none; /* Remove default arrow */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23d97706'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 20px;
            transition: all 0.2s;
        }
        select:focus {
            border-color: var(--accent-mint);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(110, 231, 183, 0.15);
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="time"] {
            width: 110px;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            cursor: pointer;
        }
        input[type="time"]:focus { border-color: var(--accent-orange); }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent-mint); }

        button.add-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--accent-orange));
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button.add-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4);
        }

        .plan-list {
            margin-top: 25px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .plan-list::-webkit-scrollbar { width: 6px; }
        .plan-list::-webkit-scrollbar-track { background: #f3f4f6; border-radius: 10px; }
        .plan-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .plan-item {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border-left: 5px solid var(--primary);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .plan-item:nth-child(odd) { border-left-color: var(--accent-mint); background: #f0fdf4; }
        .plan-item:nth-child(even) { border-left-color: var(--accent-blue); background: #eff6ff; }
        .plan-item:nth-last-child(-n+2):nth-child(odd) { border-left-color: var(--accent-pink); background: #fff1f2; }
        .plan-item:nth-last-child(-n+2):nth-child(even) { border-left-color: var(--accent-orange); background: #fff7ed; }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .plan-time {
            font-weight: 800;
            color: #4b5563;
            font-size: 0.9rem;
            width: 80px;
            flex-shrink: 0;
        }

        .plan-text {
            flex: 1;
            color: #374151;
            font-weight: 600;
            word-break: break-word;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 10px;
            padding: 0 5px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .delete-btn:hover { opacity: 1; }

        .clear-all {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #f3f4f6;
            border: none;
            border-radius: 12px;
            color: #6b7280;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .clear-all:hover { background: #e5e7eb; color: #ef4444; }

    </style>
</head>
<body>

    <!-- Floating Bubbles -->
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>

    <!-- Initial Yes/No Prompt -->
    <div id="introModal">
        <div class="modal-card">
            <h2 class="modal-title">Ready for Tomorrow? 🌻</h2>
            <p id="snippet" class="modal-text"></p>
            <div class="modal-btns">
                <button class="btn-no" onclick="closeWithNo()">No</button>
                <button class="btn-yes" onclick="startPlanner()">Yes!</button>
            </div>
        </div>
    </div>

    <!-- Main Planner Container -->
    <div id="plannerContainer">
        <svg class="sunflower-top" viewBox="0 0 100 100">
            <g fill="#fbbf24"><circle cx="50" cy="30" r="12"/><circle cx="70" cy="45" r="12"/><circle cx="65" cy="70" r="12"/><circle cx="35" cy="70" r="12"/><circle cx="30" cy="45" r="12"/></g>
            <circle cx="50" cy="50" r="16" fill="#78350f"/>
            <path d="M50 66 Q 40 85 25 80" stroke="#6ee7b7" stroke-width="6" fill="none" stroke-linecap="round"/>
            <path d="M50 66 Q 60 85 75 80" stroke="#6ee7b7" stroke-width="6" fill="none" stroke-linecap="round"/>
        </svg>

        <h1>Tomorrow's Plans</h1>
        
        <!-- Dropdown Suggestion Area -->
        <div class="dropdown-container">
            <select id="planDropdown" onchange="fillFromDropdown()">
                <option value="" disabled selected>Choose a cozy activity...</option>
                <!-- Options populated by JS -->
            </select>
        </div>

        <div class="input-row">
            <input type="time" id="timeInput">
            <input type="text" id="planInput" placeholder="Or add your own...">
        </div>

        <button class="add-btn" onclick="addPlan()">✨ Add to Schedule</button>

        <div class="plan-list" id="planList">
            <!-- Plans go here -->
        </div>

        <button class="clear-all" onclick="clearAll()">Clear Tomorrow's Board</button>
    </div>

    <script>
        // ==========================================
        //  EDIT YOUR PLAN SUGGESTIONS HERE ↓
        // ==========================================
        const SUGGESTED_PLANS = [
            "St. Paul's Cathedral",
            "Victoria Memorial",
            "Mother's Wax Meuseum",
            "Differential Eqations Date 😭",
            "Indian Meuseum",
            "Shaheed Minar",
            "Maidan",
            "Lake View Park",
            "Elliot Park",
        ];
        // ==========================================

        // Calculate Tomorrow's Date
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const options = { weekday: 'long', month: 'short', day: 'numeric' };
        document.getElementById('dateDisplay').innerText = "Date: " + tomorrow.toLocaleDateString('en-US', options);

        // Set default time
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('timeInput').value = `${hh}:${mm}`;

        let plans = JSON.parse(localStorage.getItem('sunflowerTomorrowPlans') || '[]');

        function startPlanner() {
            document.getElementById('introModal').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('introModal').style.display = 'none';
                const planner = document.getElementById('plannerContainer');
                planner.style.display = 'block';
                setTimeout(() => { planner.style.opacity = '1'; }, 50);
                
                populateDropdown();
                renderPlans();
            }, 500);
        }

        function closeWithNo() {
            document.getElementById("snippet").innerText="please say yes!!";
        }

        // Populate the dropdown on load
        function populateDropdown() {
            const select = document.getElementById('planDropdown');
            SUGGESTED_PLANS.forEach((plan, index) => {
                const option = document.createElement('option');
                option.value = plan;
                option.textContent = plan;
                select.appendChild(option);
            });
        }

        // Fill the text input when dropdown changes
        function fillFromDropdown() {
            const selectedValue = document.getElementById('planDropdown').value;
            if (selectedValue) {
                document.getElementById('planInput').value = selectedValue;
                // Reset dropdown to default state visually but keep value filled
                setTimeout(() => {
                    document.getElementById('planDropdown').selectedIndex = 0;
                }, 100);
            }
        }

        function renderPlans() {
            const list = document.getElementById('planList');
            if (plans.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:20px; color:#9ca3af; font-style:italic;">No plans yet. Try picking one from the dropdown! 🍯</div>';
                return;
            }

            plans.sort((a, b) => a.time.localeCompare(b.time));

            list.innerHTML = plans.map((plan, index) => `
                <div class="plan-item">
                    <span class="plan-time">${convertTo12Hour(plan.time)}</span>
                    <span class="plan-text">${plan.text}</span>
                    <button class="delete-btn" onclick="removePlan(${index})">&times;</button>
                </div>
            `).join('');
            list.scrollTop = list.scrollHeight;
        }

        function convertTo12Hour(time24) {
            const [h, m] = time24.split(':');
            const hour = parseInt(h);
            const suffix = hour >= 12 ? 'PM' : 'AM';
            const hour12 = hour % 12 || 12;
            return `${hour12}:${m} ${suffix}`;
        }

        function addPlan() {
            const time = document.getElementById('timeInput').value;
            const text = document.getElementById('planInput').value.trim();

            if (!time || !text) {
                alert("Oops! You need a time and a plan! 🌻");
                return;
            }

            plans.push({ time, text });
            localStorage.setItem('sunflowerTomorrowPlans', JSON.stringify(plans));
            
            document.getElementById('planInput').value = '';
            document.getElementById('planInput').focus();
            renderPlans();
        }

        function removePlan(index) {
            plans.splice(index, 1);
            localStorage.setItem('sunflowerTomorrowPlans', JSON.stringify(plans));
            renderPlans();
        }

        function clearAll() {
            if (confirm("Clear everything for tomorrow?")) {
                plans = [];
                localStorage.removeItem('sunflowerTomorrowPlans');
                renderPlans();
            }
        }

        // Initialize layout styles
        document.getElementById('plannerContainer').style.opacity = '0';
    </script>
</body>
</html>
